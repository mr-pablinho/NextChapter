# Configuration file for the CV Automation System

# Choose your preferred template style for your CV and Cover Letter. 
# You can see examples of these styles in the `examples/` folder.
# Available options: classic, modern, elegant, minimal, professional, creative, standard, sidebar
template_style: "creative"

# Set the desired font size for the LaTeX document.
# Typical values: 10pt, 11pt, 12pt
font_size: "10pt"

# Number of pages for the generated CV (default is 2)
cv_pages: 2

# Number of pages for the generated Cover Letter (default is 1)
cover_letter_pages: 1

# Choose whether to show small FontAwesome icons next to your contact info (email, phone, LinkedIn, etc.)
use_icons: true

# Choose a font package for your document. 
# Uncomment ONLY ONE of the options below. 
# Note: Some fonts might require specific LaTeX packages to be installed by tectonic.

# Choose the font family default. \sfdefault for Sans-serif, \rmdefault for Serif.
font_family: "\rmdefault"

# Sans-serif fonts (Modern & Clean)
# font_package: "\usepackage[default]{lato}"          # Lato (Default modern)
# font_package: "\usepackage[sfdefault]{roboto}"     # Roboto
# font_package: "\usepackage[default]{opensans}"   # Open Sans
# font_package: "\usepackage[sfdefault]{inter}"      # Inter
# font_package: "\usepackage[sfdefault]{FiraSans}"  # Fira Sans
# font_package: "\usepackage{helvet}"              # Helvetica (Arial-like)

# Serif fonts (Classic & Professional)
font_package: "\usepackage{lmodern}"              # Latin Modern (Typical LaTeX Serif font)
# font_package: "\usepackage{charter}"               # Charter
# font_package: "\usepackage{ebgaramond}"            # EB Garamond (Elegant classic)
# font_package: "\usepackage{libertine}"             # Linux Libertine
# font_package: "\usepackage{merriweather}"          # Merriweather

# List the minimum sections that MUST be included in the generated CV, 
# even if space is tight. The system will prioritize fitting these sections.
# Available sections from master data: summary, experience, projects, education, skills, awards, certifications, publications, conferences
minimum_sections:
  - "summary"
  - "experience"
  - "education"
  - "skills"
  - "publications"
  - "awards"